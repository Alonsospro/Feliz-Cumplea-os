<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Una Noche Especial para Ti</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-red: #4a0404;
            --soft-cream: #fffaf0;
        }

        body {
            background-color: #0a0a0a;
            color: var(--soft-cream);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        .font-serif-title { font-family: 'Cinzel', serif; }
        .font-script { font-family: 'Great Vibes', cursive; }

        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1516339901601-2e1b62dc0c45?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            padding: 2rem 0;
        }

        .border-ornament {
            border: 2px solid var(--gold);
            padding: 2rem;
            position: relative;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(8px);
            max-width: 90%;
            width: 600px;
            z-index: 10;
        }

        .border-ornament::before, .border-ornament::after {
            content: "✧";
            position: absolute;
            color: var(--gold);
            font-size: 2rem;
        }

        .border-ornament::before { top: -15px; left: -15px; }
        .border-ornament::after { bottom: -15px; right: -15px; }

        .falling-petals {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background-color: #ffb7c5;
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-confirm {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-confirm:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 15px var(--gold);
        }

        #countdown span {
            display: inline-block;
            min-width: 60px;
            font-size: 1.5rem;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <!-- Animación de pétalos -->
    <div class="falling-petals" id="petals-container"></div>

    <section class="hero-section">
        <div class="border-ornament reveal" id="main-content">
            <h2 class="text-xl tracking-widest uppercase mb-4 text-[#d4af37]">Bajo la luz de las velas</h2>
            <h1 class="text-5xl md:text-7xl font-script text-white mb-6">Feliz Cumpleaños, Amor</h1>
            <p class="text-lg leading-relaxed italic mb-8">
                "Eres el regalo más hermoso de mi vida. Por eso, quiero celebrar tu existencia en una noche diseñada solo para ti."
            </p>
            
            <div class="border-t border-b border-[#d4af37] py-6 my-6">
                <p class="font-serif-title text-2xl mb-2">Ristorante Il Borgó</p>
                <p class="text-xl mb-4">Hoy • 8:00 PM</p>
            </div>

            <div id="countdown" class="flex justify-center space-x-4 mb-8">
                <div><span id="hours">00</span><p class="text-xs uppercase">Horas</p></div>
                <div><span id="minutes">00</span><p class="text-xs uppercase">Minutos</p></div>
                <div><span id="seconds">00</span><p class="text-xs uppercase">Segundos</p></div>
            </div>

            <button class="btn-confirm" onclick="confirmInvitation()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
                </svg>
                Aceptar Invitación
            </button>
            
            <div id="confirmation-msg" class="hidden mt-4 text-pink-300 italic animate-pulse">
                ¡Confirmación enviada! Te espero impaciente ❤️
            </div>
        </div>
    </section>

    <script>
        // Configuración de WhatsApp
        const WHATSAPP_NUMBER = "59171081586";
        const MESSAGE = "¡Acepto la invitación, mi amor! ❤️ Allí estaré a las 8:00 PM para celebrar mi cumpleaños juntos en Il Borgó. Te amo.";

        // Función para enviar a WhatsApp
        function confirmInvitation() {
            // Mostrar mensaje en pantalla
            const msg = document.getElementById('confirmation-msg');
            msg.classList.remove('hidden');

            // Crear enlace de WhatsApp
            const encodedMsg = encodeURIComponent(MESSAGE);
            const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodedMsg}`;

            // Pequeño retraso para que vea la animación antes de redirigir
            setTimeout(() => {
                window.open(waLink, '_blank');
            }, 800);
        }

        // Crear pétalos animados
        function createPetals() {
            const container = document.getElementById('petals-container');
            for (let i = 0; i < 30; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                
                const size = Math.random() * 15 + 10 + 'px';
                petal.style.width = size;
                petal.style.height = size;
                
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = Math.random() * 3 + 2 + 's';
                petal.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(petal);
            }
        }

        // Contador regresivo
        function updateCountdown() {
            const now = new Date();
            const target = new Date();
            target.setHours(20, 0, 0, 0);

            if (now > target) {
                target.setDate(target.getDate() + 1);
            }

            const diff = target - now;

            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
        }

        // Inicialización
        window.onload = () => {
            createPetals();
            setInterval(updateCountdown, 1000);
            
            setTimeout(() => {
                document.getElementById('main-content').classList.add('active');
            }, 500);
        };
    </script>
</body>
</html>
